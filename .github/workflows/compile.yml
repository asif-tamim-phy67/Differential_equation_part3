name: Compile differential eq_part3
on: [push]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile differential eq_part3
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Output
          path: main.pdf
